name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch fallback for when tag-push trigger silently skips
  # (observed 2026-05-26 with v0.6.2 tag — diagnose still open).
  # Specify the tag to checkout + publish via the input below.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to publish from (e.g. v0.6.2)'
        required: true
        default: 'main'
        type: string

# Cancel in-flight publish runs for the same tag
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # OIDC für npm-provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use manual-dispatch input.ref when invoked via workflow_dispatch,
          # otherwise use the triggering ref (tag-push default behavior).
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm -r test

      - name: Build all packages
        run: pnpm -r build

      - name: Publish @nexus-mindgarden/plugin-mcp-foundation
        run: pnpm --filter @nexus-mindgarden/plugin-mcp-foundation publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexus-mindgarden/plugin-storage-foundation
        run: pnpm --filter @nexus-mindgarden/plugin-storage-foundation publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexus-mindgarden/plugin-svelte-foundation
        run: pnpm --filter @nexus-mindgarden/plugin-svelte-foundation publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexus-mindgarden/plugin-bridge-foundation
        run: pnpm --filter @nexus-mindgarden/plugin-bridge-foundation publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nexus-mindgarden/create-plugin
        run: pnpm --filter @nexus-mindgarden/create-plugin publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Published @nexus-mindgarden/* packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- plugin-mcp-foundation" >> $GITHUB_STEP_SUMMARY
          echo "- plugin-storage-foundation" >> $GITHUB_STEP_SUMMARY
          echo "- plugin-svelte-foundation" >> $GITHUB_STEP_SUMMARY
          echo "- plugin-bridge-foundation" >> $GITHUB_STEP_SUMMARY
          echo "- create-plugin" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
